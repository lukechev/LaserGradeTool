<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Grade & Level Calculator</title>
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180' width='180' height='180'><rect width='180' height='180' rx='40' fill='%231e293b'/><path d='M35 115 L80 130 L145 75' fill='none' stroke='%232563eb' stroke-width='14' stroke-linecap='round' stroke-linejoin='round'/><circle cx='35' cy='115' r='12' fill='%2364748b'/><circle cx='145' cy='75' r='12' fill='%2364748b'/><path d='M95 55 L125 55 M110 40 L110 70' fill='none' stroke='%23e2e8f0' stroke-width='6' stroke-linecap='round'/><path d='M45 45 L75 75 M75 45 L45 75' fill='none' stroke='%2338bdf8' stroke-width='6' stroke-linecap='round'/></svg>">
    <style>
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f1f5f9;
            --text: #334155;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 640px; /* Slightly wider to easily accommodate the extra evidence columns on mobile screens */
        }

        h1 {
            font-size: 1.4rem;
            text-align: center;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .card {
            background: white;
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--accent);
            border-bottom: 2px solid var(--bg);
            padding-bottom: 5px;
        }

        .row-inputs {
            display: flex;
            gap: 10px;
        }

        .row-inputs .input-group {
            flex: 1;
        }

        .input-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #f8fafc;
        }

        input[type="text"] {
            text-transform: uppercase;
        }

        input:focus {
            outline: 2px solid var(--accent);
            background-color: #fff;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #e2e8f0;
            font-size: 1.05rem;
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .result-val {
            font-weight: 700;
            color: var(--primary);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            text-align: center;
        }

        .btn-success {
            background-color: var(--success);
            margin-top: 15px;
        }

        .btn:active {
            opacity: 0.9;
        }

        .table-responsive {
            overflow-x: auto;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
            text-align: left;
        }

        th {
            background-color: var(--primary);
            color: white;
            padding: 10px;
            font-weight: 600;
            white-space: nowrap;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
        }

        tr:nth-child(even) {
            background-color: #f8fafc;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger);
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Drainage Grade Calc</h1>

        <div class="card">
            <div class="card-title">Site Data</div>
            
            <div class="row-inputs">
                <div class="input-group">
                    <label for="usName">Start MH Name</label>
                    <input type="text" id="usName" placeholder="e.g. MH1">
                </div>
                <div class="input-group">
                    <label for="dsName">End MH Name</label>
                    <input type="text" id="dsName" placeholder="e.g. MH2">
                </div>
            </div>

            <div class="input-group">
                <label for="usil">Upstream Invert Level (m)</label>
                <input type="text" inputmode="decimal" id="usil" placeholder="e.g. 50.453" oninput="runCalculator()">
            </div>
            <div class="input-group">
                <label for="dsil">Downstream Invert Level (m)</label>
                <input type="text" inputmode="decimal" id="dsil" placeholder="e.g. 50.101" oninput="runCalculator()">
            </div>
            <div class="input-group">
                <label for="dist">Horizontal Distance (m)</label>
                <input type="text" inputmode="decimal" id="dist" placeholder="e.g. 45.52" oninput="runCalculator()">
            </div>

            <button class="btn" onclick="saveCurrentRun()">Save Run to Master Log</button>
        </div>

        <div class="card">
            <div class="card-title">Laser Setup Results</div>
            <div class="result-row">
                <span>Total Fall:</span>
                <span class="result-val" id="fall">0.000 m</span>
            </div>
            <div class="result-row">
                <span>Grade Percentage:</span>
                <span class="result-val" id="pct">0.000 %</span>
            </div>
            <div class="result-row">
                <span>Gradient Ratio:</span>
                <span class="result-val" id="ratio">1 : --</span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Master Spreadsheet Log (Official Evidence)</div>
            <div class="table-responsive">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>Run (From/To)</th>
                            <th>US IL</th>
                            <th>DS IL</th>
                            <th>Dist</th>
                            <th>Fall</th>
                            <th>Grade %</th>
                            <th>Ratio (1:)</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
            
            <button class="btn btn-success" onclick="exportToCSV()">Export Complete Log (.CSV)</button>
        </div>
    </div>

    <script>
        let currentCalculatedData = null;

        window.onload = function() {
            renderHistory();
        };

        function runCalculator() {
            let usName = document.getElementById('usName').value.trim().toUpperCase() || "START";
            let dsName = document.getElementById('dsName').value.trim().toUpperCase() || "END";
            
            let us = parseFloat(document.getElementById('usil').value.replace(',', '.'));
            let ds = parseFloat(document.getElementById('dsil').value.replace(',', '.'));
            let dist = parseFloat(document.getElementById('dist').value.replace(',', '.'));

            let fallEl = document.getElementById('fall');
            let pctEl = document.getElementById('pct');
            let ratioEl = document.getElementById('ratio');

            if (isNaN(us) || isNaN(ds) || isNaN(dist) || dist <= 0) {
                fallEl.innerText = "0.000 m";
                pctEl.innerText = "0.000 %";
                ratioEl.innerText = "1 : --";
                currentCalculatedData = null;
                return;
            }

            let fall = Math.round((us - ds) * 1000)
